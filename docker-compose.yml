services:
  redis:
    image: redis:7-alpine
    # 6379 포트는 외부에 노출하지 않음 (컨테이너 내부 통신만)

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - DICTIONARY_API_KEY=${DICTIONARY_API_KEY}
    depends_on:
      - redis

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend