name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: gunoo4
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 백엔드 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: gunoo4/kkotuli-backend:latest

      - name: 프론트엔드 이미지 빌드 & 푸시
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: gunoo4/kkotuli-frontend:latest
          build-args: |
            VITE_API_BASE=http://43.201.145.134:8080/api
            VITE_WS_URL=http://43.201.145.134:8080/ws

      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd kkotuli
            git pull
            docker compose pull
            docker compose up -d
            docker image prune -f
